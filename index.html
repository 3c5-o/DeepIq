<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Iq - الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0f1d; --card: #151e32; --border: #1e293b;
            --text: #e2e8f0; --muted: #94a3b8; --primary: #6366f1; --secondary: #8b5cf6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 0.8rem 1rem; background: rgba(10,15,29,0.95); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 0.8rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-danger { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 300px; height: 100%; background: var(--card); z-index: 20; transition: right 0.3s; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .sidebar.open { right: 0; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .chat-item { padding: 0.8rem; margin-bottom: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .chat-item.active { border-color: var(--primary); background: rgba(99,102,241,0.15); }
        .chat-item-title { font-weight: 600; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item-date { font-size: 0.75rem; color: var(--muted); }
        .new-chat-btn { margin: 1rem; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 15; display: none; }
        .overlay.active { display: block; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.8rem; background: rgba(10,15,29,0.8); }
        .menu-btn { background: var(--card); border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 8px; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; text-align: center; overflow-y: auto; }
        .welcome-icon { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .welcome h1 { font-size: 1.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .welcome p { color: var(--muted); margin-bottom: 2rem; line-height: 1.7; max-width: 500px; }
        
        .messages { flex: 1; padding: 1rem; overflow-y: auto; display: none; flex-direction: column; gap: 1rem; }
        .msg { max-width: 90%; padding: 0.8rem 1rem; border-radius: 12px; line-height: 1.6; animation: fadeUp 0.3s ease; word-break: break-word; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-start; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-bottom-right-radius: 4px; }
        .msg.assistant { align-self: flex-end; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }        .msg-role { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.3rem; opacity: 0.9; }
        .msg-content { white-space: pre-wrap; }
        .msg-content code { background: rgba(0,0,0,0.3); padding: 0.1rem 0.3rem; border-radius: 4px; font-family: monospace; }
        .msg-content pre { background: rgba(0,0,0,0.3); padding: 0.6rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
        .msg-content pre code { background: none; padding: 0; }
        
        .input-area { padding: 0.8rem; border-top: 1px solid var(--border); background: rgba(10,15,29,0.95); }
        .input-box { display: flex; gap: 0.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 0.4rem; align-items: flex-end; }
        #userInput { flex: 1; background: transparent; border: none; color: var(--text); font-size: 1rem; padding: 0.5rem; resize: none; outline: none; min-height: 40px; max-height: 100px; }
        .send-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--primary); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading { position: fixed; inset: 0; background: rgba(10,15,29,0.9); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 100; gap: 1rem; }
        .loading.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.2); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); border: 1px solid var(--border); border-right: 4px solid var(--primary); padding: 0.8rem 1.2rem; border-radius: 10px; z-index: 200; transition: transform 0.3s; max-width: 90%; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-right-color: #ef4444; }
        
        @media (min-width: 768px) {
            .sidebar { width: 280px; right: 0; position: relative; height: auto; }
            .overlay { display: none !important; }
            .menu-btn { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-brain"></i>Deep Iq</div>
        <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-danger" onclick="clearChat()"><i class="fas fa-trash"></i></button>
            <button class="btn btn-primary" onclick="newChat()"><i class="fas fa-plus"></i></button>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-comments"></i> المحادثات</h3>
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <div class="chat-list" id="chatList"></div>
            <button class="new-chat-btn" onclick="newChat()"><i class="fas fa-plus"></i> محادثة جديدة</button>
        </aside>

        <main class="chat-area">            <div class="chat-header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div style="font-weight:700;">مساعد الذكاء الاصطناعي</div>
                <div style="margin-right:auto;background:rgba(99,102,241,0.2);color:var(--primary);padding:0.2rem 0.6rem;border-radius:20px;font-size:0.8rem;">DeepSeek-V4</div>
            </div>

            <div class="welcome" id="welcome">
                <i class="fas fa-brain welcome-icon"></i>
                <h1>مرحبًا بك في Deep Iq</h1>
                <p>مساعد ذكاء اصطناعي متقدم مدعوم بـ DeepSeek للإجابة على أسئلتك، البرمجة، والتحليل.</p>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem;width:100%;max-width:600px;">
                    <div style="background:var(--card);padding:1rem;border-radius:10px;text-align:center;"><i class="fas fa-bolt" style="color:var(--primary);font-size:1.5rem;margin-bottom:0.5rem;"></i><div style="font-weight:600;">سرعة</div></div>
                    <div style="background:var(--card);padding:1rem;border-radius:10px;text-align:center;"><i class="fas fa-shield-alt" style="color:var(--primary);font-size:1.5rem;margin-bottom:0.5rem;"></i><div style="font-weight:600;">خصوصية</div></div>
                    <div style="background:var(--card);padding:1rem;border-radius:10px;text-align:center;"><i class="fas fa-code" style="color:var(--primary);font-size:1.5rem;margin-bottom:0.5rem;"></i><div style="font-weight:600;">برمجة</div></div>
                </div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="input-box">
                    <textarea id="userInput" placeholder="اكتب رسالتك..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="color:var(--muted);">جاري التفكير...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 🔑 ضع التوكن هنا للتجربة
        const CONFIG = {
            TOKEN: "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",
            API: "https://router.huggingface.co/v1/chat/completions",
            MODEL: "deepseek-ai/DeepSeek-V4-Pro:novita"
        };

        let state = {
            currentId: null,
            chats: JSON.parse(localStorage.getItem('deepiq_chats')) || []
        };

        const $ = id => document.getElementById(id);
                function showToast(msg, err=false) {
            const t = $('toast');
            t.textContent = msg;
            t.className = 'toast show' + (err?' error':'');
            setTimeout(()=>t.classList.remove('show'), 3000);
        }

        function toggleSidebar() {
            $('sidebar').classList.toggle('open');
            $('overlay').classList.toggle('active');
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
            $('sendBtn').disabled = !el.value.trim();
        }

        function saveChats() { localStorage.setItem('deepiq_chats', JSON.stringify(state.chats)); }

        function newChat() {
            state.currentId = Date.now().toString();
            state.chats.unshift({ id: state.currentId, title: 'محادثة جديدة', messages: [], time: new Date().toISOString() });
            saveChats();
            $('welcome').style.display = 'flex';
            $('messages').style.display = 'none';
            $('messages').innerHTML = '';
            $('userInput').value = '';
            autoResize($('userInput'));
            renderList();
            if(window.innerWidth<768) toggleSidebar();
            showToast('تم إنشاء محادثة جديدة');
        }

        function renderList() {
            const list = $('chatList');
            list.innerHTML = '';
            if(state.chats.length===0) {
                list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:2rem;">لا توجد محادثات</div>';
                return;
            }
            state.chats.forEach(c => {
                const div = document.createElement('div');
                div.className = 'chat-item' + (c.id===state.currentId?' active':'');
                div.innerHTML = `<div class="chat-item-title">${c.title}</div><div class="chat-item-date">${new Date(c.time).toLocaleDateString('ar-SA')}</div>`;
                div.onclick = () => loadChat(c.id);
                list.appendChild(div);
            });
        }
        function loadChat(id) {
            state.currentId = id;
            const chat = state.chats.find(c=>c.id===id);
            if(!chat) return;
            $('welcome').style.display = 'none';
            $('messages').style.display = 'flex';
            $('messages').innerHTML = '';
            chat.messages.forEach(m => addMsg(m.role, m.content, false));
            renderList();
            if(window.innerWidth<768) toggleSidebar();
            $('messages').scrollTop = $('messages').scrollHeight;
        }

        function saveCurrentChat() {
            if(!state.currentId) return;
            const chat = state.chats.find(c=>c.id===state.currentId);
            if(!chat) return;
            chat.messages = [];
            document.querySelectorAll('.msg').forEach(el => {
                chat.messages.push({
                    role: el.classList.contains('user') ? 'user' : 'assistant',
                    content: el.querySelector('.msg-content').innerText.trim()
                });
            });
            chat.time = new Date().toISOString();
            saveChats();
            renderList();
        }

        function clearChat() {
            if(!state.currentId) return showToast('لا توجد محادثة حالية', true);
            if(!confirm('مسح جميع الرسائل؟')) return;
            const chat = state.chats.find(c=>c.id===state.currentId);
            if(chat) {
                chat.messages = [];
                chat.title = 'محادثة جديدة';
                saveChats();
                $('messages').innerHTML = '';
                renderList();
                showToast('تم المسح');
            }
        }

        async function sendMessage() {
            const input = $('userInput');
            const text = input.value.trim();
            if(!text || state.processing) return;

            state.processing = true;
            $('loading').classList.add('active');            $('sendBtn').disabled = true;

            $('welcome').style.display = 'none';
            $('messages').style.display = 'flex';

            addMsg('user', text);
            input.value = '';
            autoResize(input);

            try {
                const chat = state.chats.find(c=>c.id===state.currentId);
                const history = chat ? chat.messages.map(m=>({role:m.role, content:m.content})) : [];
                
                const res = await fetch(CONFIG.API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.TOKEN}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        messages: [...history, {role:'user', content:text}],
                        max_tokens: 2048
                    })
                });

                if(!res.ok) {
                    const err = await res.json().catch(()=>({}));
                    throw new Error(err.error?.message || `خطأ ${res.status}`);
                }

                const data = await res.json();
                addMsg('assistant', data.choices[0].message.content);
                saveCurrentChat();

                if(chat && chat.title==='محادثة جديدة') {
                    chat.title = text.substring(0,30) + (text.length>30?'...':'');
                    saveChats();
                    renderList();
                }

            } catch(err) {
                console.error(err);
                addMsg('assistant', `⚠️ فشل الاتصال: ${err.message}\n\nتأكد من:\n1. اتصال الإنترنت\n2. صحة التوكن\n3. عدم حظر المتصفح للطلبات الخارجية`, true);
                showToast(err.message, true);
            } finally {
                state.processing = false;
                $('loading').classList.remove('active');
                $('sendBtn').disabled = false;
                input.focus();                $('messages').scrollTop = $('messages').scrollHeight;
            }
        }

        function addMsg(role, content, save=true) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const formatted = content
                .replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>')
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            
            div.innerHTML = `
                <div class="msg-role">${role==='user'?'أنت':'المساعد'}</div>
                <div class="msg-content">${formatted}</div>
            `;
            $('messages').appendChild(div);
            $('messages').scrollTop = $('messages').scrollHeight;
        }

        window.onload = () => {
            renderList();
            if(state.chats.length>0 && !state.currentId) loadChat(state.chats[0].id);
            autoResize($('userInput'));
        };
    </script>
</body>
</html>
